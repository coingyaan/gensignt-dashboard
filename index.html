<!DOCTYPE html>
<html>
<head>
  <title>GenSignt — AI Intelligence Layer for GenLayer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="topbar">
  <div>⚡ GenSignt</div>
  <div>🟢 GenLayer Testnet</div>
</div>

<h1>GenSignt — AI Intelligence Layer for GenLayer</h1>

<button onclick="connectWallet()">Connect Wallet</button>
<p id="walletAddress"></p>

<div class="glass">
  <button onclick="getScore()">Get Score</button>
  <button onclick="checkIn()">Check-in</button>
  <div id="result"></div>
<p id="timer"></p>
</div>

<div class="glass">
  <h2>🤖 AI Assistant</h2>
  <div id="chatbox"></div>
  <input id="prompt" placeholder="Ask about your wallet">
  <button onclick="askAI()">Send</button>
</div>

<div class="glass">
  <h2>Leaderboard</h2>
  <button onclick="loadLeaderboard()">Load</button>
  <ul id="leaderboard"></ul>
</div>

<div class="glass">
  <h2>Transaction Logs</h2>
  <button onclick="loadLogs()">Load</button>
  <ul id="logs"></ul>
</div>

<script src="script.js"></script>

</body>
</html>
